<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Cloud | Accès Sécurisé</title>
    <style>
        :root { --sage: #8A9A5B; --cream: #F9F8F4; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding: 20px; }
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .container { max-width: 800px; margin: 0 auto; display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--sage); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .profile-btn { width: auto; background: transparent; color: var(--sage); border: 2px solid var(--sage); margin: 5px; }
        .profile-btn.active { background: var(--sage); color: white; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        header { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <h2 id="authTitle">Se connecter</h2>
        <input type="email" id="email" placeholder="Email du couple">
        <input type="password" id="password" placeholder="Mot de passe">
        
        <div id="registerFields" style="display:none;">
            <input type="text" id="p1_name" placeholder="Prénom Partenaire 1">
            <input type="text" id="p2_name" placeholder="Prénom Partenaire 2">
            <input type="date" id="wedding_date">
        </div>

        <button id="mainAuthBtn" onclick="handleAuth()">Connexion</button>
        <p onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer; font-size: 0.8em; margin-top: 15px; color: var(--sage);">Pas encore de compte ? Créer un espace</p>
    </div>

    <div id="appScreen" class="container">
        <header>
            <h1 id="coupleTitle">Chargement...</h1>
            <div class="profile-switcher">
                <button class="profile-btn" id="btnP1" onclick="switchUser(1)"></button>
                <button class="profile-btn" id="btnP2" onclick="switchUser(2)"></button>
            </div>
            <button onclick="logout()" style="width:auto; background:none; color:red; border:none; margin-top:10px;">Déconnexion</button>
        </header>

        <section class="card">
            <h3>✅ Tâches</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="taskInput" placeholder="Ajouter une tâche...">
                <button onclick="addTask()" style="width:80px;">+</button>
            </div>
            <div id="todoList"></div>
        </section>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "TA_CLE_API",
        authDomain: "TON_PROJET.firebaseapp.com",
        databaseURL: "https://TON_PROJET-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "TON_PROJET",
        storageBucket: "TON_PROJET.appspot.com",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isRegisterMode = false;
    let currentUserData = null;
    let selectedPartner = "";

    // 1. GESTION DE L'AUTH (CONNEXION / INSCRIPTION)
    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('registerFields').style.display = isRegisterMode ? 'block' : 'none';
        document.getElementById('authTitle').innerText = isRegisterMode ? 'Créer votre compte' : 'Se connecter';
        document.getElementById('mainAuthBtn').innerText = isRegisterMode ? 'S\'inscrire' : 'Connexion';
        document.getElementById('toggleText').innerText = isRegisterMode ? 'Déjà un compte ? Se connecter' : 'Pas de compte ? Créer un espace';
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        try {
            if (isRegisterMode) {
                const p1 = document.getElementById('p1_name').value;
                const p2 = document.getElementById('p2_name').value;
                const date = document.getElementById('wedding_date').value;
                
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                // Sauvegarder les infos du couple en base
                await set(ref(db, 'users/' + userCredential.user.uid + '/config'), {
                    partner1: p1, partner2: p2, weddingDate: date
                });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
        } catch (error) { alert(error.message); }
    };

    // 2. SURVEILLER L'ÉTAT DE CONNEXION
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appScreen').style.display = 'none';
        }
    });

    // 3. CHARGEMENT DES DONNÉES
    function loadData(uid) {
        onValue(ref(db, 'users/' + uid), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            currentUserData = data;
            
            document.getElementById('coupleTitle').innerText = `${data.config.partner1} & ${data.config.partner2}`;
            document.getElementById('btnP1').innerText = data.config.partner1;
            document.getElementById('btnP2').innerText = data.config.partner2;
            if(!selectedPartner) switchUser(1);

            renderTasks(data.tasks, uid);
        });
    }

    window.switchUser = (n) => {
        selectedPartner = n === 1 ? currentUserData.config.partner1 : currentUserData.config.partner2;
        document.getElementById('btnP1').className = n === 1 ? 'profile-btn active' : 'profile-btn';
        document.getElementById('btnP2').className = n === 2 ? 'profile-btn active' : 'profile-btn';
    };

    window.addTask = () => {
        const text = document.getElementById('taskInput').value;
        if(!text) return;
        push(ref(db, `users/${auth.currentUser.uid}/tasks`), {
            text, done: false, owner: selectedPartner
        });
        document.getElementById('taskInput').value = "";
    };

    window.toggleTask = (id, status) => {
        update(ref(db, `users/${auth.currentUser.uid}/tasks/${id}`), { done: !status });
    };

    function renderTasks(tasks, uid) {
        const list = document.getElementById('todoList');
        list.innerHTML = "";
        if(!tasks) return;
        Object.keys(tasks).forEach(id => {
            const t = tasks[id];
            list.innerHTML += `
                <div class="item-row ${t.done ? 'completed' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTask('${id}', ${t.done})">
                    <span>${t.text} <small>(${t.owner})</small></span>
                </div>`;
        });
    }

    window.logout = () => signOut(auth);
</script>
</body>
</html>
