<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Cloud | Notre Mariage</title>
    <style>
        :root { --sage: #8A9A5B; --cream: #F9F8F4; --gold: #D4AF37; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cream); color: var(--dark); margin: 0; padding: 10px; }
        .auth-container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .container { max-width: 600px; margin: 0 auto; display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--sage); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .profile-btn { width: auto; background: transparent; color: var(--sage); border: 2px solid var(--sage); margin: 5px; padding: 8px 15px; }
        .profile-btn.active { background: var(--sage); color: white; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #eee; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: Georgia, serif; color: var(--sage); }
        .delete-btn { background: none; color: #ff7675; border: none; cursor: pointer; width: auto; padding: 0; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <h2 id="authTitle">Se connecter</h2>
        <input type="email" id="email" placeholder="Email du couple">
        <input type="password" id="password" placeholder="Mot de passe">
        
        <div id="registerFields" style="display:none;">
            <input type="text" id="p1_name" placeholder="Prénom Partenaire 1">
            <input type="text" id="p2_name" placeholder="Prénom Partenaire 2">
            <input type="date" id="wedding_date">
        </div>

        <button id="mainAuthBtn" onclick="handleAuth()">Connexion</button>
        <p onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer; font-size: 0.9em; margin-top: 15px; color: var(--sage); text-decoration: underline;">Pas encore de compte ? Créer un espace</p>
    </div>

    <div id="appScreen" class="container">
        <header>
            <h1 id="coupleTitle">Chargement...</h1>
            <p id="countdown" style="font-weight: bold; color: var(--gold);"></p>
            <div class="profile-switcher">
                <button class="profile-btn" id="btnP1" onclick="switchUser(1)"></button>
                <button class="profile-btn" id="btnP2" onclick="switchUser(2)"></button>
            </div>
            <button onclick="logout()" style="width:auto; background:none; color:#999; border:none; margin-top:10px; font-size: 0.8em;">Déconnexion</button>
        </header>

        <section class="card">
            <h3>✅ Checklist</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="taskInput" placeholder="Ex: Choisir le vin..." style="flex:2">
                <select id="catInput" style="flex:1">
                    <option value="Logistique">Logistique</option>
                    <option value="Tenues">Tenues</option>
                    <option value="Traiteur">Traiteur</option>
                    <option value="Déco">Déco</option>
                </select>
                <button onclick="addTask()" style="width:50px;">+</button>
            </div>
            <div id="todoList"></div>
        </section>

        <section class="card">
            <h3>👥 Invités</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="guestName" placeholder="Nom de l'invité" style="flex:2">
                <button onclick="addGuest()" style="width:50px;">+</button>
            </div>
            <div id="guestList"></div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
